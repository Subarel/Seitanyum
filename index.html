<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SeitanYum</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#0A6CFF;--blue-d:#0850C4;--ink:#0D1B2A;--ink2:#4A5A6A;--ink3:#8A98A6;--bg:#FFFFFF;--bg2:#F6F8FA;--line:#E6EAEE;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg2);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--ink);}
.hub{width:100%;max-width:400px;text-align:center;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;letter-spacing:-1px;color:var(--ink);margin-bottom:4px;}
.logo span{color:var(--blue);}
.tag{font-size:14px;color:var(--ink3);margin-bottom:40px;}
.cards{display:flex;flex-direction:column;gap:12px;}
.card{background:var(--bg);border:1.5px solid var(--line);border-radius:18px;padding:20px;text-decoration:none;display:flex;align-items:center;gap:16px;transition:all .15s ease;box-shadow:0 1px 2px rgba(13,27,42,.04);}
.card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(10,108,255,.12);transform:translateY(-2px);}
.ci{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.g{background:#EAF2FF;}
.a{background:#FFF1E0;}
.ct{text-align:left;flex:1;}
.ct-t{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.ct-d{font-size:12px;color:var(--ink3);}
.arr{margin-left:auto;font-size:18px;color:var(--blue);}
.foot{margin-top:32px;font-size:11px;color:var(--ink3);}
</style>
</head>
<body>
<div class="hub">
  <div class="logo">Seitan<span>Yum</span></div>
  <div class="tag">Plant-powered protein. Real taste.</div>
  <div class="cards">
    <a class="card" href="store/index.html"><div class="ci g">🛒</div><div class="ct"><div class="ct-t">Customer Store</div><div class="ct-d">Browse menu & place your order</div></div><div class="arr">→</div></a>
    <a class="card" href="admin/index.html"><div class="ci a">🔐</div><div class="ct"><div class="ct-t">Admin Dashboard</div><div class="ct-d">Manage orders, products, revenue</div></div><div class="arr">→</div></a>
  </div>
  <div class="foot">© 2025 SeitanYum • 100% Plant-Based</div>
</div>
</body>
</html>
