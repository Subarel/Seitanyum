<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SeitanYum</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--F:#1E3A0F;--L:#8DC63F;--A:#E8A020;--C:#FAF6EF;--B:#D9D0C0;--W:#FFFDF9;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--C);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.hub{width:100%;max-width:400px;text-align:center;}
.logo{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--F);letter-spacing:-2px;margin-bottom:5px;}
.logo em{font-style:normal;color:var(--L);}
.tag{font-size:14px;color:#999;margin-bottom:40px;}
.cards{display:flex;flex-direction:column;gap:12px;}
.card{background:var(--W);border:1.5px solid var(--B);border-radius:20px;padding:22px 20px;text-decoration:none;display:flex;align-items:center;gap:16px;transition:all .2s;}
.card:hover{transform:translateY(-3px);border-color:var(--L);box-shadow:0 8px 32px rgba(30,58,15,.12);}
.ci{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.g{background:linear-gradient(135deg,#4A7A28,var(--F));}.a{background:linear-gradient(135deg,var(--A),#C45C2A);}
.ct{text-align:left;}
.ct-t{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--F);margin-bottom:2px;}
.ct-d{font-size:12px;color:#999;line-height:1.4;}
.arr{margin-left:auto;font-size:18px;color:var(--L);flex-shrink:0;}
.foot{margin-top:32px;font-size:11px;color:#ccc;}
</style>
</head>
<body>
<div class="hub">
  <div class="logo">SeitanYum<em>.</em></div>
  <div class="tag">Plant-powered protein. Real taste.</div>
  <div class="cards">
    <a class="card" href="store/index.html"><div class="ci g">🛒</div><div class="ct"><div class="ct-t">Customer Store</div><div class="ct-d">Browse menu, add to cart, place your order</div></div><div class="arr">→</div></a>
    <a class="card" href="admin/index.html"><div class="ci a">🔐</div><div class="ct"><div class="ct-t">Admin Dashboard</div><div class="ct-d">Manage orders, products, revenue</div></div><div class="arr">→</div></a>
  </div>
  <div class="foot">© 2025 SeitanYum • 100% Plant-Based</div>
</div>
</body>
</html>
